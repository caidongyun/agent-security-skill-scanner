# Skill Features
features:
  - Static Analysis Engine (静态分析引擎)
  - Dynamic Detection Engine (动态检测引擎)
  - Risk Scoring System (风险评分系统)
  - Parallel Scanning (并行扫描)
  - Auto Iteration (自动迭代)
  - Rule Optimization (规则优化)
  - Whitelist Management (白名单管理)
  - Multi-format Reports (多格式报告)

# Performance Metrics
