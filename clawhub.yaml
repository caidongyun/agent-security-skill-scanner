# Requirements
requirements:
  python: ">=3.8"
  memory: ">=128MB"
  disk: ">=50MB"
  openclaw: ">=2.0.0 (optional)"

# Installation
installation:
  method: clawhub install agent-security-skill-scanner
  manual: |
    tar -xzf agent-security-skill-scanner-v2.0.1.tar.gz
    cd v2.0.1
    ./install.sh

# Usage Examples
usage:
  scan_single: python cli.py scan <skill_directory>
  scan_batch: python cli.py scan-all <skills_directory>
  parallel_scan: python cli.py scan-all <skills_directory> --workers 4
  json_output: python cli.py scan <skill_directory> --format json

